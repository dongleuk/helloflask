apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-flask
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-flask
  template:
    metadata:
      labels:
        app: hello-flask
    spec:
      containers:
      - name: hello-flask
        image: dongleuk/hello-flask
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: APP_MESSAGE
          valueFrom:
            configMapKeyRef:
              name: hello-flask-config
              key: APP_MESSAGE
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: hello-flask-config
              key: DB_HOST
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: hello-flask-config
              key: DB_USER
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: hello-flask-secrets
              key: DB_PASS
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: hello-flask-config
              key: DB_NAME
        - name: ADMIN_USERNAME
          valueFrom:
            configMapKeyRef:
              name: hello-flask-config
              key: ADMIN_USERNAME
        - name: ADMIN_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: hello-flask-config
              key: ADMIN_PASSWORD
        volumeMounts:
        - name: config-volume
          mountPath: /config
      volumes:
      - name: config-volume
        configMap:
          name: hello-flask-config-mount
