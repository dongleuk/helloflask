<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shopping List</title>
    <style>
      body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
      h1 { margin-bottom: 1rem; }
      form { margin-bottom: 1rem; }
      input, button { padding: 0.4rem; }
      ul { list-style: none; padding: 0; }
      li { display: flex; gap: 0.5rem; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid #ddd; }
      .spacer { flex: 1; }
      a { text-decoration: none; }
      .delete { background: #b91c1c; color: white; border: 0; cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>Shopping List</h1>
    <p>Logged in as <strong>{{ username }}</strong></p>
    <form method="post" action="{{ url_for('logout') }}">
      <button type="submit">Logout</button>
    </form>

    <form method="post" action="{{ url_for('create_item') }}">
      <input name="name" placeholder="Item name" required>
      <input name="quantity" type="number" min="1" value="1" required>
      <button type="submit">Add Item</button>
    </form>

    <ul>
      {% for item in items %}
      <li>
        <strong>{{ item.name }}</strong>
        <span>x{{ item.quantity }}</span>
        <span class="spacer"></span>
        <a href="{{ url_for('edit_item_page', item_id=item.id) }}">Edit</a>
        <form method="post" action="{{ url_for('delete_item', item_id=item.id) }}" style="margin:0;">
          <button class="delete" type="submit">Delete</button>
        </form>
      </li>
      {% else %}
      <li>No items yet.</li>
      {% endfor %}
    </ul>
  </body>
</html>
